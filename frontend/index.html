<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Website Builder</title>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
        color: #333;
      }
      .auth-page, .dashboard-layout, .project-layout {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .project-layout {
        flex-direction: row;
        align-items: stretch;
      }
      .chat-panel, .file-viewer, .preview-panel {
        flex: 1;
        border: 1px solid #ccc;
        margin: 10px;
        display: flex;
        flex-direction: column;
        background: white;
      }
      .chat-messages, .file-content, .preview-frame {
        flex: 1;
        overflow-y: auto;
      }
      .preview-frame {
        width: 100%;
        border: none;
      }
      .sidebar {
        width: 250px;
        background: #fff;
        border-right: 1px solid #ccc;
        padding: 20px;
      }
      .dashboard-main {
        flex: 1;
        padding: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
      }
      .form-group input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
      }
      button {
        padding: 10px 15px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:disabled {
        background: #ccc;
      }
      textarea {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
